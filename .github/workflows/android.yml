name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install CMake 3.10.2 manually
        run: |
          wget https://cmake.org/files/v3.10/cmake-3.10.2-Linux-x86_64.sh
          chmod +x cmake-3.10.2-Linux-x86_64.sh
          sudo ./cmake-3.10.2-Linux-x86_64.sh --skip-license --prefix=/usr/local
          
      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix Missing Imports in LogBottomSheet (Correct Packages)
        run: |
          # Definimos las rutas de importación reales del core de AutoJs6
          IMPORT_1="import org.autojs.autojs.AutoJs"
          IMPORT_2="import org.autojs.autojs.execution.ExecutionConfig"
          
          # Insertamos los componentes legítimos debajo de la declaración del paquete
          sed -i "s|package org.autojs.autojs.ui.log|package org.autojs.autojs.ui.log\n\n${IMPORT_1}\n${IMPORT_2}|" app/src/main/java/org/autojs/autojs/ui/log/LogBottomSheet.kt
  
      - name: Force Compatible R8 and Build Specific arm64-v8a APKs
        run: |
          # 1. Regeneramos el init.gradle para que R8 ignore el bloqueo "Should never be called"
          echo "buildscript { dependencies { classpath('com.android.tools:r8:8.5.10') } }" > init.gradle
          
          # 2. Compilamos de forma limpia inyectando tu arquitectura arm64-v8a
          ./gradlew clean :app:assembleInrtRelease :app:assembleAppRelease -I init.gradle -Pandroid.injected.build.abi=arm64-v8a --no-daemon
    
      - name: Upload arm64 artifacts
        id: upload-arm64-apk
        uses: actions/upload-artifact@v4
        with:
          name: release-arm64-apk
          path: app/build/outputs/apk/app/release/*-arm64-v8a.apk
        continue-on-error: true

      - name: Upload armv7 artifacts
        id: upload-armv7-apk
        uses: actions/upload-artifact@v4
        with:
          name: release-armv7-apk
          path: app/build/outputs/apk/app/release/*-v7a.apk
        continue-on-error: true

      - name: Upload universal artifacts
        id: upload-universal-apk
        uses: actions/upload-artifact@v4
        with:
          name: release-universal-apk
          path: app/build/outputs/apk/app/release/*-universal.apk
        continue-on-error: true
      
      - name: Capturar Reporte de Errores de Kotlin
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-de-errores
          path: build/reports/problems/
